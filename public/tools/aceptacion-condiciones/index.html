document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Fdiv>\n    <\u002Ffooter>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     SHEET 02 — ACEPTACIÓN DE PROPUESTA COMERCIAL\n     ============================================================ -->\n<section class=\"page has-watermark\" data-screen-label=\"02 Aceptación de Propuesta Comercial\">\n  <div class=\"wm-bg\" aria-hidden=\"true\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b6  — Ciudad Autónoma de Buenos Aires\n    <\u002Fdiv>\n\n    <div class=\"ref-line\">\n      <span class=\"tag\">Ref.<\u002Fspan>\n      <span class=\"text\">Aceptación de Propuesta Comercial · Id <input class=\"field w-md\" type=\"text\" name=\"field\" placeholder=\"0000 / 2026\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"letter-body\">\n      <p>De mi mayor consideración:<\u002Fp>\n\n      <p>Por la presente, en mi carácter de <input class=\"field w-md\" type=\"text\" name=\"field\" placeholder=\"cargo / representación\"> de <input class=\"field w-lg\" type=\"text\" name=\"field\" placeholder=\"razón social del cliente\">, con CUIT <input class=\"field w-md\" type=\"text\" name=\"field\" placeholder=\"00-00000000-0\"> y domicilio constituido a efectos de la presente en <input class=\"field w-xl\" type=\"text\" name=\"field\" placeholder=\"calle, número, localidad y código postal\">, nos dirigimos a Uds. en relación a vuestra Propuesta Comercial de referencia de fecha <input class=\"field w-md\" type=\"text\" name=\"field\" placeholder=\"DD / MM / AAAA\">.<\u002Fp>\n\n      <p>La presente constituye la <strong>aceptación expresa, plena e irrevocable<\u002Fstrong> de la Propuesta Comercial de referencia y de las <strong>Condiciones Generales de Almacenaje, Carga, Descarga y/o Transporte<\u002Fstrong> que se adjuntan y forman parte integrante de este documento, las cuales declaro conocer y aceptar en su totalidad (Art. 971 CCCN).<\u002Fp>\n\n      <p class=\"salute\">Aprovecho la oportunidad para saludarlo muy atentamente.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"letter-sign\">\n      <div class=\"pad\"><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Aclaración<\u002Fspan><span class=\"v\"><input class=\"field w-xl\" type=\"text\" name=\"field\" placeholder=\"Nombre y apellido completo\"><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">DNI<\u002Fspan><span class=\"v\"><input class=\"field w-md\" type=\"text\" name=\"field\" placeholder=\"00.000.000\"><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Cargo<\u002Fspan><span class=\"v\"><input class=\"field w-lg\" type=\"text\" name=\"field\" placeholder=\"Cargo o representación que invoca\"><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot\">\n      <span class=\"ref\">Aceptación de Propuesta · VEROTIN S.A. · Modelo 2026<\u002Fspan>\n      <span class=\"page-num\">02<em>/<\u002Fem>07<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     SHEET 03 — CONDICIONES GENERALES — Portadilla + I, II, III\n     ============================================================ -->\n<section class=\"page has-watermark\" data-screen-label=\"03 Condiciones · Cláusulas I – III\">\n  <div class=\"wm-bg\" aria-hidden=\"true\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:238mm\">\n  <\u002Fdiv>\n  <div class=\"page-inner\">\n\n    <div class=\"runner\">\n      <div class=\"mark\"><span class=\"dot\"><\u002Fspan><span class=\"name\">Logística TOPS · Condiciones Generales<\u002Fspan><\u002Fdiv>\n      <div class=\"meta\"><span>Sección II<\u002Fspan><span>Cláusulas I · II · III<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cond-hero\">\n      <div class=\"num-mark\"><span>Sección II · Condiciones Generales<\u002Fspan><\u002Fdiv>\n      <h2><span style=\"font-weight:300;\">Condiciones generales de<\u002Fspan><br><strong>Almacenaje, Carga, Descarga<\u002Fstrong><br><span style=\"font-weight:300;\">y Transporte de<\u002Fspan> <span class=\"accent\">mercadería de terceros.<\u002Fspan><\u002Fh2>\n      <p class=\"desc\">Condiciones aplicables a la prestación de los servicios de depósito y movimiento de mercaderías por parte de <strong>VEROTIN S.A.<\u002Fstrong> Su aceptación es condición integrante de la Propuesta Comercial referida en la Sección I del presente documento.<\u002Fp>\n    <\u002Fdiv>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Primera<\u002Fspan><span class=\"ttl\">Seguros<\u002Fspan><\u002Fheader>\n      <p><span class=\"n\">1.1.<\u002Fspan> Es requisito exigido para la prestación de los servicios objeto de estas condiciones generales de contratación, que toda <strong>MERCADERÍA<\u002Fstrong> que se entregue para almacenaje y/o transporte se encuentre asegurada por <strong>EL CLIENTE<\u002Fstrong> por todo riesgo y a su exclusivo costo y cargo. VEROTIN S.A. no será responsable por los eventuales siniestros y/o daños y/o perjuicios que pudieran afectar a LA MERCADERÍA y/o a terceros durante el almacenaje y/o en el curso del transporte, carga y/o descarga de LA MERCADERÍA, ya sea que el siniestro, daño y/o pérdida provenga de la naturaleza y/o vicio propio de LA MERCADERÍA y/o defecto de embalaje y/o cualquiera sea la causa, motivo u ocasión en que el siniestro, daño y/o pérdida sucedan, a excepción de los derivados de su culpa grave debidamente probada, con un tope máximo indemnizatorio equivalente a <strong>3 (tres) meses<\u002Fstrong> de la tarifa promedio de almacenaje del último semestre.<\u002Fp>\n      <p><span class=\"n\">1.2.<\u002Fspan> EL CLIENTE deberá mantener vigente los siguientes seguros: <strong>a)<\u002Fstrong> un seguro que cubra todo riesgo inherente a LA MERCADERÍA almacenada y/o transportada, ya sea robo, hurto, incendio, deterioro, pérdida total o parcial, incluyendo los daños que pudieran derivarse de inundaciones, temporales o granizo, siendo la presente enumeración meramente enunciativa; <strong>b)<\u002Fstrong> un seguro de responsabilidad civil por el importe que se indique en las condiciones particulares de contratación, que cubra los daños que puedan eventualmente causarse a cualquier tercero y/o a bienes de terceros, con las mercaderías almacenadas y/o transportadas y/o con motivo de su pérdida total o parcial; <strong>c)<\u002Fstrong> seguros de accidentes de trabajo (ART) y/o de accidentes personales que cubran eventuales siniestros, daños y/o lesiones que pudieran ocurrir respectivamente al personal dependiente o contratado del CLIENTE que ingrese o esté autorizado a ingresar a las instalaciones de VEROTIN S.A.<\u002Fp>\n      <p><span class=\"n\">1.3.<\u002Fspan> La/s póliza/s correspondiente/s deberá/n tener una vigencia temporal sin solución de continuidad y contener una <em>cláusula de no repetición o subrogación<\u002Fem> en la que conste que la aseguradora y EL CLIENTE renuncian y desisten de toda acción, derecho y/o reclamo por cualquier concepto y causa contra VEROTIN S.A., sus accionistas, miembros del Directorio y/o empleados. El cumplimiento de lo aquí previsto por EL CLIENTE no limitará su responsabilidad si los daños o perjuicios excedieran el monto de dichas pólizas.<\u002Fp>\n      <p><span class=\"n\">1.4.<\u002Fspan> EL CLIENTE deberá acreditar la contratación y vigencia de los seguros precedentemente relacionados, mediante la presentación de copias y exhibición de original de las respectivas pólizas y comprobantes de pago de las primas correspondientes.<\u002Fp>\n    <\u002Farticle>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Segunda<\u002Fspan><span class=\"ttl\">Propiedad y origen lícito de la mercadería<\u002Fspan><\u002Fheader>\n      <p>EL CLIENTE declara y garantiza que LA MERCADERÍA almacenada y/o transportada es de su propiedad y de origen lícito, y libera a VEROTIN S.A. de toda responsabilidad sobre el particular, asumiendo el compromiso de <strong>mantenerla indemne<\u002Fstrong> ante el eventual reclamo de terceros.<\u002Fp>\n    <\u002Farticle>\n\n    <div class=\"foot\">\n      <span class=\"ref\">Condiciones Generales · VEROTIN S.A. · Modelo 2026<\u002Fspan>\n      <span class=\"page-num\">03<em>/<\u002Fem>07<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     SHEET 04 — IV, V, VI\n     ============================================================ -->\n<section class=\"page has-watermark\" data-screen-label=\"04 Cláusulas III · IV · V · VI\">\n  <div class=\"wm-bg\" aria-hidden=\"true\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:238mm\">\n  <\u002Fdiv>\n  <div class=\"page-inner\">\n\n    <div class=\"runner\">\n      <div class=\"mark\"><span class=\"dot\"><\u002Fspan><span class=\"name\">Logística TOPS · Condiciones Generales<\u002Fspan><\u002Fdiv>\n      <div class=\"meta\"><span>Sección II<\u002Fspan><span>Cláusulas III · IV · V · VI<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Tercera<\u002Fspan><span class=\"ttl\">Pallets<\u002Fspan><\u002Fheader>\n      <p>EL CLIENTE deberá almacenar LA MERCADERÍA <strong>sobre pallets sin excepción<\u002Fstrong>, los cuales serán provistos por EL CLIENTE a su exclusivo costo y cargo. En caso que EL CLIENTE omitiera cumplir con esta obligación, será exclusivo responsable de los efectos derivados de dicha omisión, renunciando a formular reclamo alguno a VEROTIN S.A. sobre el particular.<\u002Fp>\n    <\u002Farticle>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Cuarta<\u002Fspan><span class=\"ttl\">Responsabilidad por el contenido de bultos cerrados<\u002Fspan><\u002Fheader>\n      <p>VEROTIN S.A. no se responsabiliza por el contenido de los bultos cerrados, salvo declaración del CLIENTE del contenido y su verificación por VEROTIN S.A. antes de la entrega en el depósito y/o en el vehículo en caso de transporte, sujeto a que se deje constancia de tal declaración y verificación en documento firmado por EL CLIENTE y VEROTIN S.A.<\u002Fp>\n    <\u002Farticle>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Quinta<\u002Fspan><span class=\"ttl\">Responsabilidad por la cantidad, calidad o estado<\u002Fspan><\u002Fheader>\n      <p><span class=\"n\">5.1.<\u002Fspan> VEROTIN S.A. <strong>no será responsable en caso alguno<\u002Fstrong>, de la cantidad, calidad o estado de LA MERCADERÍA ingresada y/o almacenada y/o transportada, ni del contenido de cada uno de los bultos entregados por EL CLIENTE. VEROTIN S.A. no tendrá injerencia alguna en las fechas de fabricación, determinación de las fechas de vencimiento u otros relacionados con el seguimiento del producto en cuanto a su uso, por cuanto no tiene la obligación de revisar LA MERCADERÍA que ingresa a sus instalaciones y/o a sus vehículos. En consecuencia, VEROTIN S.A. podrá siempre rechazar el ingreso o transporte de MERCADERÍA a su juicio exclusivo, así como exigir el retiro de aquella MERCADERÍA que, una vez ingresada, no se encuentre en adecuado estado de conservación o que se encuentre embalada deficientemente. Si VEROTIN S.A. descubre o concluye que la MERCADERÍA recibida le acarrea peligro o le causa o pudiera causar perjuicio a otras mercaderías almacenadas, podrá requerir su inmediato retiro al CLIENTE y éste estará obligado a retirarla y/o recibirla. EL CLIENTE responderá y mantendrá indemne siempre a VEROTIN S.A. en caso de cualquier contingencia y/o perjuicio en esta materia.<\u002Fp>\n      <p><span class=\"n\">5.2.<\u002Fspan> <span class=\"lbl\">Modalidad depósito exclusivo<\u002Fspan> (puerta con llave exclusiva para el CLIENTE). Atento que dichos espacios, su ingreso/cerramiento y la mercadería en ellos almacenada son administrados bajo exclusivo control del CLIENTE y sin intervención de VEROTIN S.A., el CLIENTE será <strong>exclusivo y único responsable<\u002Fstrong> del control de stock de mercadería allí almacenada, su calidad, contenido, cantidad y vencimiento. Asimismo y sin perjuicio de la modalidad de “depósito exclusivo”, el CLIENTE se obliga a hacer entrega a VEROTIN S.A. de la llave de acceso o bien a permitir el mismo, ante el requerimiento fundado de VEROTIN S.A. (como ser con motivo de auditorías o inspecciones).<\u002Fp>\n    <\u002Farticle>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Sexta<\u002Fspan><span class=\"ttl\">Responsabilidad por la cantidad de bultos. Peso, medida y clase<\u002Fspan><\u002Fheader>\n      <p>VEROTIN S.A. sólo responderá por la <strong>cantidad de bultos<\u002Fstrong> ingresados a sus instalaciones. VEROTIN S.A. no se responsabiliza por el peso, medida o clase de LA MERCADERÍA almacenada y/o transportada y no controlada; control que se acreditará mediante documentos firmados. La declaración del CLIENTE sobre el tipo, peso, fechas de fabricación y/o vencimiento, o estado de LA MERCADERÍA es de su exclusiva responsabilidad.<\u002Fp>\n      <div class=\"callout\">\n        <span class=\"lab\">Mercadería peligrosa<\u002Fspan>\n        En ningún caso se almacenará mercadería o materiales denominados <strong>PELIGROSOS<\u002Fstrong> (Clases 1, 2, 3, 4, 5, 6, 7, 8 y 9 O.N.U.), los cuales EL CLIENTE declara conocer y se obliga a no ingresar a las instalaciones de VEROTIN S.A.\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <div class=\"foot\">\n      <span class=\"ref\">Condiciones Generales · VEROTIN S.A. · Modelo 2026<\u002Fspan>\n      <span class=\"page-num\">04<em>/<\u002Fem>07<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     SHEET 05 — VII, VIII, IX, X\n     ============================================================ -->\n<section class=\"page has-watermark\" data-screen-label=\"05 Cláusulas VII – X\">\n  <div class=\"wm-bg\" aria-hidden=\"true\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:238mm\">\n  <\u002Fdiv>\n  <div class=\"page-inner\">\n\n    <div class=\"runner\">\n      <div class=\"mark\"><span class=\"dot\"><\u002Fspan><span class=\"name\">Logística TOPS · Condiciones Generales<\u002Fspan><\u002Fdiv>\n      <div class=\"meta\"><span>Sección II<\u002Fspan><span>Cláusulas VII · VIII · IX · X<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Séptima<\u002Fspan><span class=\"ttl\">Ingreso y/o estadía de vehículos y/o contenedores del cliente<\u002Fspan><\u002Fheader>\n      <p>En el supuesto de que EL CLIENTE contrate el permiso por parte de VEROTIN del <strong>ingreso y/o estadía diaria y/o nocturna<\u002Fstrong> de vehículos y/o contenedores de propiedad o a servicio del CLIENTE en dependencias de VEROTIN, EL CLIENTE será exclusivo y único responsable de cualquier daño, deterioro, perjuicio, robo, hurto y/o siniestro — siendo la presente enumeración meramente enunciativa — que pudiera acaecer a los mismos y/o a su contenido y/o mercadería durante el ingreso, estadía o salida de dichas dependencias; renunciando en forma absoluta e irrevocable a reclamar cualquier tipo de indemnización o compensación a VEROTIN.<\u002Fp>\n    <\u002Farticle>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Octava<\u002Fspan><span class=\"ttl\">Caso fortuito o fuerza mayor. Declaraciones del cliente<\u002Fspan><\u002Fheader>\n      <p>VEROTIN S.A. queda expresamente liberada de toda responsabilidad por las eventuales consecuencias que pudieran derivarse de <strong>caso fortuito o fuerza mayor<\u002Fstrong>, y/o de los siniestros o hechos enumerados en estas condiciones generales y/o de la veracidad o falsedad de las declaraciones efectuadas por EL CLIENTE.<\u002Fp>\n    <\u002Farticle>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Novena<\u002Fspan><span class=\"ttl\">Retiro de la mercadería<\u002Fspan><\u002Fheader>\n      <p><span class=\"n\">9.1.<\u002Fspan> El retiro parcial o total de LA MERCADERÍA almacenada se hará únicamente contra entrega de una <strong>orden escrita y firmada<\u002Fstrong> por la persona o personas autorizadas por EL CLIENTE.<\u002Fp>\n      <p><span class=\"n\">9.2.<\u002Fspan> En caso de retiro total de las mercaderías, se requerirá además el <strong>previo pago<\u002Fstrong> a VEROTIN S.A. de todos los servicios prestados — almacenaje, carga y descarga, transporte — y/o facturas pendientes de cancelación y el cumplimiento de las previsiones de la Cláusula Décimoprimera de estas condiciones generales. De no abonarse los importes adeudados, VEROTIN S.A. procederá conforme las previsiones de las Cláusulas Novena y Décima de estas condiciones generales.<\u002Fp>\n      <p><span class=\"n\">9.3.<\u002Fspan> <span class=\"lbl\">Caducidad de reclamos por daños o faltantes visibles.<\u002Fspan> El retiro de la mercadería sin observaciones en el remito de salida <strong>extinguirá de pleno derecho<\u002Fstrong> cualquier reclamo por daños o faltantes visibles (Art. 747 CCCN).<\u002Fp>\n    <\u002Farticle>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Décima<\u002Fspan><span class=\"ttl\">Mora del cliente. Intereses y derecho de retención<\u002Fspan><\u002Fheader>\n      <p><span class=\"n\">10.1.<\u002Fspan> La mora opera <strong>en forma automática<\u002Fstrong> sin necesidad de notificación alguna. La falta de pago en tiempo y forma de los servicios prestados por VEROTIN S.A., y/o en su caso de la indemnización sustitutiva de preaviso (conf. Cláusula Décimoprimera), importará el devengamiento de intereses equivalentes al <strong>triple de la tasa activa<\u002Fstrong> que percibe el BNA para sus operaciones de descuento de documentos a 30 días, con más un coeficiente de actualización equivalente al <strong>Índice de Precios al Consumidor (IPC)<\u002Fstrong> publicado por el INDEC, y el ejercicio por parte de VEROTIN S.A. del derecho de retención de LA MERCADERÍA almacenada (Arts. 2587 a 2593 del CCyCN), sin necesidad de comunicación previa al CLIENTE, desde la fecha de mora y hasta el efectivo pago.<\u002Fp>\n      <p><span class=\"n\">10.2.<\u002Fspan> <span class=\"lbl\">Devengamiento durante la retención.<\u002Fspan> El ejercicio del derecho de retención <strong>no interrumpe<\u002Fstrong> el devengamiento de los cargos por almacenaje, los cuales seguirán acumulándose a la deuda del CLIENTE hasta la liberación total de la mercadería.<\u002Fp>\n    <\u002Farticle>\n\n    <div class=\"foot\">\n      <span class=\"ref\">Condiciones Generales · VEROTIN S.A. · Modelo 2026<\u002Fspan>\n      <span class=\"page-num\">05<em>/<\u002Fem>07<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     SHEET 06 — XI, XII, XIII\n     ============================================================ -->\n<section class=\"page has-watermark\" data-screen-label=\"06 Cláusulas XI – XIII\">\n  <div class=\"wm-bg\" aria-hidden=\"true\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:-10mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:52mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:114mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:176mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:238mm\">\n  <\u002Fdiv>\n  <div class=\"page-inner\">\n\n    <div class=\"runner\">\n      <div class=\"mark\"><span class=\"dot\"><\u002Fspan><span class=\"name\">Logística TOPS · Condiciones Generales<\u002Fspan><\u002Fdiv>\n      <div class=\"meta\"><span>Sección II<\u002Fspan><span>Cláusulas XI · XII · XIII<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Décimoprimera<\u002Fspan><span class=\"ttl\">Reducción de los servicios — Rescisión — Resolución<\u002Fspan><\u002Fheader>\n      <p><span class=\"n\">11.1.<\u002Fspan> En el caso que EL CLIENTE decida dar por finalizada la relación comercial o proceda al retiro total de la mercadería almacenada o solicite una reducción de los servicios contratados <strong>igual o mayor al 50%<\u002Fstrong>, deberá dar aviso en forma fehaciente a VEROTIN S.A. con una antelación de <strong>30 (treinta) días corridos por cada año<\u002Fstrong> de vigencia transcurrido desde el inicio de la relación comercial y en todos los casos con una antelación no menor a <strong>60 (sesenta) días corridos<\u002Fstrong>. Si EL CLIENTE omitiera formular el preaviso en tiempo y forma deberá abonar a VEROTIN S.A. una indemnización equivalente a 1 (un) mes de alquiler por cada 30 (treinta) días de preaviso omitidos, y en todos los casos un mínimo de 2 (dos) meses de alquiler. A dicho efecto indemnizatorio se considerará como “mes de alquiler” aquel de mayor valor abonado en el transcurso del año inmediato anterior a la fecha de rescisión/reducción de servicios pretendida. VEROTIN podrá por su parte rescindir la relación comercial mediante notificación al cliente con un mínimo de 60 (sesenta) días corridos de preaviso sin necesidad de invocar causa alguna y sin que de ello se derive derecho a indemnización, compensación ni erogación alguna.<\u002Fp>\n      <p><span class=\"n\">11.2.<\u002Fspan> Asimismo, si la reducción de los servicios contratados fuera <strong>igual o superior al 30% pero inferior al 50%<\u002Fstrong>, las PARTES deberán renegociar los valores aplicables. Si las PARTES no llegaran a un acuerdo dentro de los 30 (treinta) días corridos, cualquiera de las PARTES podrá considerar resuelto el contrato, debiendo EL CLIENTE abonar a VEROTIN una indemnización equivalente a 1 (un) mes de alquiler por cada año de vigencia transcurrido desde el inicio de la relación comercial y en todos los casos un mínimo de 2 (dos) meses de alquiler.<\u002Fp>\n      <p><span class=\"n\">11.3.<\u002Fspan> <span class=\"lbl\">Condición de Egreso.<\u002Fspan> Las partes acuerdan expresamente que el pago íntegro de la indemnización sustitutiva mencionada en los puntos anteriores es <strong>condición <em>sine qua non<\u002Fem><\u002Fstrong> para la autorización de salida de la última unidad de mercadería de los depósitos de VEROTIN S.A. Hasta tanto no se acredite dicho pago, VEROTIN S.A. podrá ejercer el derecho de retención previsto en la Cláusula Décima, manteniendo el devengamiento de los cargos por almacenaje diarios que correspondan.<\u002Fp>\n    <\u002Farticle>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Décimosegunda<\u002Fspan><span class=\"ttl\">Cesión<\u002Fspan><\u002Fheader>\n      <p>EL CLIENTE <strong>no podrá ceder<\u002Fstrong> en todo o en parte la relación emergente de la aceptación de las presentes condiciones generales a ningún tercero, a menos que dicha cesión haya sido autorizada previamente por escrito por VEROTIN S.A.<\u002Fp>\n    <\u002Farticle>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Décimotercera<\u002Fspan><span class=\"ttl\">Ley aplicable y jurisdicción<\u002Fspan><\u002Fheader>\n      <p>Las divergencias que pudieran suscitarse con motivo de la interpretación o ejecución de la presente serán resueltas conforme <strong>legislación argentina<\u002Fstrong> por los <strong>Tribunales Ordinarios con sede en la Ciudad Autónoma de Buenos Aires<\u002Fstrong>, renunciando el CLIENTE a toda otra jurisdicción que pudiera corresponder.<\u002Fp>\n    <\u002Farticle>\n\n    <div class=\"foot\">\n      <span class=\"ref\">Condiciones Generales · VEROTIN S.A. · Modelo 2026<\u002Fspan>\n      <span class=\"page-num\">06<em>/<\u002Fem>07<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     SHEET 07 — XIV + Firma final\n     = =\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:-8mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:54mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:116mm;top:238mm\">\n    <img class=\"tile\" src=\"cd442da4-53b9-4470-9168-7fb5363b63e1\" alt=\"\" style=\"left:178mm;top:238mm\">\n  <\u002Fdiv>\n  <div class=\"page-inner\">\n\n    <div class=\"runner\">\n      <div class=\"mark\"><span class=\"dot\"><\u002Fspan><span class=\"name\">Logística TOPS · Condiciones Generales<\u002Fspan><\u002Fdiv>\n      <div class=\"meta\"><span>Sección II<\u002Fspan><span>Cláusula XIV · Firmas<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <article class=\"clause\">\n      <header class=\"clause-head\"><span class=\"num\">Cláusula Décimocuarta<\u002Fspan><span class=\"ttl\">Domicilios y aceptación<\u002Fspan><\u002Fheader>\n      <p><span class=\"n\">14.1.<\u002Fspan> Toda notificación entre EL CLIENTE y VEROTIN S.A. deberá ser efectuada fehacientemente a los siguientes domicilios: <strong>VEROTIN S.A.<\u002Fstrong> — Agustín Magaldi 1765, Ciudad Autónoma de Buenos Aires, C1286AFM. <strong>EL CLIENTE<\u002Fstrong> — <input class=\"field w-xl\" type=\"text\" name=\"field\" placeholder=\"calle, número, localidad, código postal\">. Los citados domicilios se considerarán válidos hasta que sea notificada su modificación, la cual sólo podrá efectuarse en el ámbito de la República Argentina.<\u002Fp>\n      <p><span class=\"n\">14.2.<\u002Fspan> <span class=\"lbl\">Aceptación tácita reforzada.<\u002Fspan> La entrega de mercadería para su almacenaje y/o la falta de rechazo expreso de esta propuesta dentro de las <strong>48 (cuarenta y ocho) horas<\u002Fstrong> de recibida, implicará la aceptación plena de las presentes Condiciones Generales anexas (Art. 979 CCCN).<\u002Fp>\n    <\u002Farticle>\n\n    <div class=\"sign-prelude\">\n      <p>EL CLIENTE — <input class=\"field w-xl\" type=\"text\" name=\"field\" placeholder=\"razón social\"> — declara que ha leído y acepta las <strong>Condiciones Generales de Almacenaje, Carga, Descarga y Transporte de Mercadería de Terceros<\u002Fstrong> precedentemente transcriptas, así como los términos de la propuesta comercial adjunta, la cual integra la presente. La persona abajo firmante deberá acreditar personería mediante la presentación de fotocopia de Estatuto Social y Acta de designación de autoridades vigente y/o poder con facultades suficientes, manifestando el firmante según interviene, que las facultades con que actúa no le han sido revocadas, suspendidas ni limitadas, así como que no ha variado la capacidad de obrar de su representada.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"signatures\">\n      <div class=\"sig\">\n        <div class=\"pad\"><\u002Fdiv>\n        <div class=\"role\">Por VEROTIN S.A.<\u002Fdiv>\n        <div class=\"name\">Cynthia Paola Alba<\u002Fdiv>\n        <div class=\"detail\">Apoderada · DNI 29.245.752<br>Agustín Magaldi 1765 · CABA<br>Lugar: ____________  Fecha: ___/___/_____<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sig\">\n        <div class=\"pad\"><\u002Fdiv>\n        <div class=\"role\">Por EL CLIENTE<\u002Fdiv>\n        <div class=\"name\"><input class=\"field w-lg\" type=\"text\" name=\"field\" placeholder=\"Nombre y apellido\"><\u002Fdiv>\n        <div class=\"detail\">\n          Cargo: <input class=\"field w-md\" type=\"text\" name=\"field\" placeholder=\"cargo\">  ·  DNI <input class=\"field w-md\" type=\"text\" name=\"field\" placeholder=\"00.000.000\"><br>\n          Lugar: <input class=\"field w-md\" type=\"text\" name=\"field\" placeholder=\"ciudad\">  ·  Fecha: <input class=\"field w-sm\" type=\"text\" name=\"field\" placeholder=\"DD / MM / AAAA\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot\">\n      <span class=\"ref\">Condiciones Generales · VEROTIN S.A. · Modelo 2026<\u002Fspan>\n
