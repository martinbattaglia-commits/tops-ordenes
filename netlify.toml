# =========================================================================
# Netlify — TOPS Órdenes
# Deploy automático del proyecto Next.js. Requiere el plugin
# @netlify/plugin-nextjs (se instala automáticamente desde el UI).
# =========================================================================

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Node 22 (LTS): requerido por pdfjs-dist@5 (engines node ">=22.13.0 || >=24")
  # y pdf-parse@2 (">=22.3.0"). Con Node 20 el `next build` rompía con exit 2.
  NODE_VERSION = "22"
  # next build (compile + type-check estricto de 300+ archivos + 4 docs @react-pdf)
  # supera el heap por defecto del contenedor → OOM en "checking validity of types".
  # Reproducido local: OOM a 1024MB, OK a 4096MB. Subimos el heap del build.
  NODE_OPTIONS = "--max-old-space-size=4096"
  NEXT_TELEMETRY_DISABLED = "1"
  # Secret scanning — falso positivo en templates estáticos.
  # Los HTML de /public/tools (contratos, cotizador, propuestas) embeben fuentes
  # en base64 cuyo contenido contiene subcadenas "eyJ". NO son JWT/secretos:
  # verificado 0 estructura a.b.c y 0 coincidencia con env vars. Netlify los marca
  # como "exposed secrets". Se excluye SOLO ese path estático del escaneo.
  # NEXT_PUBLIC_* son públicas por diseño (se inlinean en el bundle cliente) → se omiten del scan.
  SECRETS_SCAN_OMIT_PATHS = "public/tools/**"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_MAPBOX_TOKEN,NEXT_PUBLIC_APP_URL,NEXT_PUBLIC_DEMO_MODE"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ---- PWA: el SW debe responderse SIEMPRE fresco -------------------------
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"

# ---- Iconos y assets estáticos ------------------------------------------
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# ---- Headers de seguridad globales --------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), geolocation=(self), microphone=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
