<meta name="theme-color" content="#050555" />
<style>
/* =====================================================================
   TOPS NEXUS · standalone demo · v2026.05
   Todo embebido, sin dependencias externas. Abrir doble-click.
   ===================================================================== */

:root {
  --tops-blue-900: #050555;
  --tops-blue-700: #214576;
  --tops-red: #c90812;
  --neutral-0: #ffffff;
  --neutral-50: #f7f8fb;
  --neutral-100: #eef1f6;
  --neutral-200: #dde3ec;
  --neutral-300: #c2cad6;
  --neutral-400: #8a94a6;
  --neutral-500: #5a6577;
  --neutral-700: #2a3340;
  --neutral-900: #0b1220;
  --status-success: #0e7c3a;
  --status-warning: #b45309;
  --status-danger: #c90812;
  --status-info: #214576;
  --bg-page: #f7f8fb;
  --bg-surface: #ffffff;
  --fg-primary: #0b1220;
  --fg-secondary: #5a6577;
  --fg-muted: #8a94a6;
  --fg-brand: #050555;
  --stroke-soft: #dde3ec;
  --stroke-strong: #c2cad6;
  --shadow-xs: 0 1px 2px rgba(5,5,85,0.06);
  --shadow-sm: 0 2px 6px rgba(5,5,85,0.08);
  --shadow-md: 0 6px 18px rgba(5,5,85,0.10);
  --shadow-lg: 0 18px 40px rgba(5,5,85,0.16);
}

:root.dark {
  --bg-page: #0a0e1c;
  --bg-surface: #11162a;
  --fg-primary: #e6e9f2;
  --fg-secondary: #aab1c2;
  --fg-muted: #7a8195;
  --fg-brand: #e6e9f2;
  --stroke-soft: #1f2540;
  --stroke-strong: #2a3252;
  --neutral-50: #11162a;
  --neutral-100: #161c33;
  --neutral-200: #1f2540;
  --neutral-300: #2a3252;
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg-page);
  color: var(--fg-primary);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; padding: 0; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
input, select, textarea { font: inherit; color: inherit; }

.tabular { font-variant-numeric: tabular-nums; }
.mono { font-family: "SF Mono", Menlo, Monaco, monospace; }
.hidden { display: none !important; }
.sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }

/* ========== LAYOUT ========== */
.app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }
.sidebar {
  background: var(--tops-blue-900);
  color: #fff;
  display: flex;
  flex-direction: column;
  padding: 16px 12px 12px;
  overflow-y: auto;
  position: sticky;
  top: 0;
  height: 100vh;
}
.main { display: flex; flex-direction: column; min-width: 0; }
.topbar {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--stroke-soft);
  display: flex; align-items: center; gap: 12px;
  padding: 12px 24px;
  min-height: 56px;
}
.content { padding: 24px 32px 80px; flex: 1; min-width: 0; }

/* Sidebar brand */
.brand-block {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 0 16px; gap: 8px;
  cursor: pointer;
}
.brand-block:hover { opacity: .9; }
.brand-logo {
  width: 80px; height: 80px;
  background: var(--tops-blue-900);
  border-radius: 8px;
  display: grid; place-items: center;
  position: relative;
  border: 2px solid rgba(255,255,255,0.08);
}
.brand-logo svg { width: 50px; height: 50px; }
.brand-name {
  font-size: 15px; font-weight: 900;
  letter-spacing: 0.18em;
  color: #fff;
}
.brand-tagline {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--tops-red);
  text-transform: uppercase;
}

.sidebar-section { display: flex; flex-direction: column; gap: 2px; margin-top: 16px; }
.sidebar-section-label {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,255,255,0.42);
  padding: 0 8px 6px;
}
.sidebar-link {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.78);
  cursor: pointer;
  transition: all 160ms;
  position: relative;
  text-align: left;
  width: 100%;
}
.sidebar-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
.sidebar-link.active { background: rgba(255,255,255,0.10); color: #fff; }
.sidebar-link.accent::before {
  content: ""; position: absolute; left: -2px; top: 8px; bottom: 8px;
  width: 3px; background: var(--tops-red); border-radius: 0 2px 2px 0;
}
.sidebar-link svg { width: 16px; height: 16px; flex-shrink: 0; }
.sidebar-link .count {
  margin-left: auto;
  background: rgba(255,255,255,0.10);
  color: rgba(255,255,255,0.7);
  font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 999px;
  font-variant-numeric: tabular-nums;
}
.sidebar-link .badge {
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: rgba(201,8,18,0.3);
  border: 1px solid rgba(201,8,18,0.4);
  color: rgba(255,255,255,0.8);
  padding: 1px 5px; border-radius: 3px;
}
.sidebar-footer { margin-top: auto; padding-top: 16px; }
.sidebar-user {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
  cursor: pointer;
}
.sidebar-user .avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--tops-red);
  display: grid; place-items: center;
  font-weight: 700; font-size: 12px; color: #fff;
}
.sidebar-user .name { font-size: 12px; font-weight: 700; color: #fff; line-height: 1.2; }
.sidebar-user .role { font-size: 10px; color: rgba(255,255,255,0.55); }
.depots-mini { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.depot-ping {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: rgba(255,255,255,0.85);
  padding: 4px 8px; background: rgba(255,255,255,0.05); border-radius: 6px;
}
.depot-ping .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #34d399;
  box-shadow: 0 0 0 3px rgba(52,211,153,0.20);
}
.version-stamp {
  font-size: 9px; color: rgba(255,255,255,0.30);
  text-align: center;
  margin-top: 8px;
  font-family: "SF Mono", monospace;
}

/* Topbar */
.tb-brand { display: flex; align-items: center; gap: 10px; }
.tb-brand .name { font-size: 14px; font-weight: 900; letter-spacing: 0.16em; color: var(--tops-blue-900); }
.tb-brand .pill {
  font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
  color: var(--tops-red);
  border: 1px solid rgba(201,8,18,0.3);
  background: rgba(201,8,18,0.06);
  padding: 2px 8px; border-radius: 4px; text-transform: uppercase;
}
.tb-search {
  flex: 1; max-width: 360px;
  position: relative;
}
.tb-search input {
  width: 100%;
  border: 1px solid var(--stroke-soft);
  background: var(--neutral-50);
  border-radius: 8px;
  padding: 7px 12px 7px 32px;
  font-size: 13px;
  outline: none;
}
.tb-search input:focus { border-color: var(--tops-blue-700); background: var(--bg-surface); }
.tb-search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--fg-muted); }
.tb-search .kbd {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-family: "SF Mono", monospace; font-size: 10px;
  background: var(--bg-surface); border: 1px solid var(--stroke-soft);
  padding: 1px 5px; border-radius: 4px; color: var(--fg-muted);
}
.tb-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.tb-pill-date {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--fg-secondary);
  border: 1px solid var(--stroke-soft);
  background: var(--bg-surface);
  border-radius: 999px;
  padding: 4px 10px;
}
.tb-pill-date .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.18);
}
.icon-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: grid; place-items: center;
  color: var(--fg-secondary);
  border: 1px solid var(--stroke-soft);
  background: var(--bg-surface);
  transition: all 160ms;
  position: relative;
}
.icon-btn:hover { background: var(--neutral-50); color: var(--fg-primary); }
.icon-btn svg { width: 16px; height: 16px; }
.icon-btn .dot-notif {
  position: absolute; top: 6px; right: 7px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--tops-red);
  border: 1.5px solid var(--bg-surface);
}

/* ========== COMPONENTS ========== */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  border-radius: 6px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.02em;
  transition: all 160ms;
  white-space: nowrap;
  border: 1px solid transparent;
}
.btn svg { width: 14px; height: 14px; }
.btn-primary { background: var(--tops-blue-900); color: #fff; }
.btn-primary:hover { background: var(--tops-blue-700); }
.btn-danger { background: var(--tops-red); color: #fff; }
.btn-danger:hover { background: #a8060f; }
.btn-ghost { background: var(--bg-surface); color: var(--fg-primary); border-color: var(--stroke-soft); }
.btn-ghost:hover { background: var(--neutral-50); border-color: var(--stroke-strong); }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-lg { padding: 10px 18px; font-size: 14px; }

.card {
  background: var(--bg-surface);
  border: 1px solid var(--stroke-soft);
  border-radius: 10px;
  box-shadow: var(--shadow-xs);
  overflow: hidden;
}
.card-pad { padding: 20px; }
.card-pad-lg { padding: 24px 28px; }
.card-head {
  padding: 14px 20px;
  border-bottom: 1px solid var(--stroke-soft);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.card-head .title { font-size: 13px; font-weight: 700; color: var(--fg-primary); }
.card-head .sub { font-size: 11px; color: var(--fg-secondary); margin-top: 2px; }
.featured { position: relative; }
.featured::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: var(--tops-red); border-radius: 10px 10px 0 0;
}

/* Page header */
.page-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
}
.eyebrow {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--tops-red);
  margin-bottom: 6px;
}
.page-title {
  font-size: 28px; font-weight: 700;
  color: var(--fg-brand);
  letter-spacing: -0.01em;
  margin: 0 0 4px;
}
.page-subtitle { font-size: 13px; color: var(--fg-secondary); margin: 0; }

/* Badges */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: 999px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.badge-success { background: rgba(14,124,58,0.10); color: var(--status-success); }
.badge-warning { background: rgba(180,83,9,0.10); color: var(--status-warning); }
.badge-info { background: rgba(33,69,118,0.10); color: var(--tops-blue-700); }
.badge-danger { background: rgba(201,8,18,0.10); color: var(--tops-red); }
.badge-muted { background: var(--neutral-100); color: var(--fg-secondary); }

/* KPI */
.kpi-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  margin-bottom: 20px;
}
.kpi { padding: 18px 20px; position: relative; }
.kpi-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--fg-muted); margin-bottom: 8px;
}
.kpi-value {
  font-size: 28px; font-weight: 700;
  color: var(--fg-brand);
  letter-spacing: -0.01em; line-height: 1;
  margin-bottom: 8px;
  font-variant-numeric: tabular-nums;
}
.kpi-delta {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600;
}
.kpi-delta.up { color: var(--status-success); }
.kpi-delta.down { color: var(--status-danger); }
.kpi-delta .vs { color: var(--fg-muted); font-weight: 400; margin-left: 4px; }
.kpi-spark {
  position: absolute; bottom: 12px; right: 14px;
  width: 64px; height: 24px;
}

/* Table */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl thead th {
  text-align: left;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--fg-muted);
  padding: 10px 14px;
  border-bottom: 1px solid var(--stroke-soft);
  background: var(--neutral-50);
}
.tbl tbody td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--stroke-soft);
  color: var(--fg-primary);
  vertical-align: middle;
}
.tbl tbody tr:hover { background: var(--neutral-50); cursor: pointer; }
.tbl tbody tr:last-child td { border-bottom: 0; }

/* Avatar */
.avatar-circle {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--tops-blue-700); color: #fff;
  display: grid; place-items: center;
  font-weight: 700; font-size: 11px;
  flex-shrink: 0;
}
.avatar-sq {
  width: 36px; height: 36px;
  border-radius: 6px;
  background: var(--tops-blue-900); color: #fff;
  display: grid; place-items: center;
  font-weight: 700; font-size: 11px;
  flex-shrink: 0;
}

/* Module cards (cockpit) */
.modules-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.module-card {
  padding: 16px;
  background: var(--bg-surface);
  border: 1px solid var(--stroke-soft);
  border-radius: 10px;
  transition: all 200ms;
  cursor: pointer;
  position: relative;
  display: block;
  text-align: left;
}
.module-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
  border-color: var(--stroke-strong);
}
.module-card .icon {
  width: 38px; height: 38px;
  border-radius: 8px;
  background: var(--tops-blue-900); color: #fff;
  display: grid; place-items: center;
  margin-bottom: 10px;
}
.module-card .icon svg { width: 18px; height: 18px; }
.module-card .title { font-size: 13px; font-weight: 700; color: var(--fg-primary); }
.module-card .sub { font-size: 11px; color: var(--fg-muted); margin-bottom: 8px; }
.module-card .stat {
  font-size: 11px; font-weight: 700; color: var(--fg-brand);
  font-variant-numeric: tabular-nums;
}
.module-card .tag {
  position: absolute; top: 8px; right: 8px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--tops-red);
  background: rgba(201,8,18,0.10);
  padding: 1px 5px; border-radius: 3px;
}

/* Cockpit grid */
.cockpit-row {
  display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px;
  margin-bottom: 20px;
}

/* Mapa AMBA */
.amba-map { width: 100%; height: auto; }

/* Activity feed */
.feed-item {
  padding: 12px 20px;
  display: flex; gap: 10px; align-items: flex-start;
  border-bottom: 1px solid var(--stroke-soft);
}
.feed-item:last-child { border-bottom: 0; }
.feed-item:hover { background: var(--neutral-50); }
.feed-icon {
  width: 30px; height: 30px;
  border-radius: 6px;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.feed-icon svg { width: 13px; height: 13px; }
.feed-icon.signed { background: rgba(14,124,58,0.10); color: var(--status-success); }
.feed-icon.email { background: rgba(33,69,118,0.10); color: var(--tops-blue-700); }
.feed-icon.cctv { background: rgba(180,83,9,0.10); color: var(--status-warning); }
.feed-icon.anmat { background: rgba(201,8,18,0.10); color: var(--tops-red); }
.feed-icon.doc { background: rgba(33,69,118,0.10); color: var(--tops-blue-700); }
.feed-title { font-size: 12px; font-weight: 700; color: var(--fg-primary); }
.feed-detail { font-size: 11px; color: var(--fg-secondary); }
.feed-meta { font-size: 10px; color: var(--fg-muted); margin-top: 2px; }

/* Kanban (pipeline) */
.kanban-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(220px, 1fr));
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 10px;
}
.stage-col { background: var(--bg-surface); border: 1px solid var(--stroke-soft); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
.stage-head { padding: 12px 14px; border-bottom: 1px solid var(--stroke-soft); }
.stage-name {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  color: var(--fg-secondary); text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
}
.stage-name .swatch { width: 8px; height: 8px; border-radius: 50%; }
.stage-stats { display: flex; align-items: end; justify-content: space-between; margin-top: 4px; }
.stage-count { font-size: 22px; font-weight: 700; color: var(--fg-brand); line-height: 1; font-variant-numeric: tabular-nums; }
.stage-amount { font-size: 11px; color: var(--fg-muted); font-variant-numeric: tabular-nums; }
.deal-row {
  padding: 8px 12px;
  border-top: 1px solid var(--stroke-soft);
  cursor: pointer;
  transition: background 120ms;
}
.deal-row:hover { background: var(--neutral-50); }
.deal-title { font-size: 12px; font-weight: 700; color: var(--fg-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.deal-contact { font-size: 10px; color: var(--fg-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.deal-amount { font-size: 11px; font-weight: 700; color: var(--fg-brand); font-variant-numeric: tabular-nums; }

/* CCTV grid */
.cctv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px; }
.cam-tile {
  border-radius: 8px; overflow: hidden;
  border: 1px solid var(--stroke-soft);
  aspect-ratio: 16/9;
  position: relative;
  cursor: pointer;
  transition: all 200ms;
}
.cam-tile:hover { box-shadow: var(--shadow-md); }
.cam-tile .bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #050555 0%, #0a0a3a 50%, #050555 100%);
}
.cam-tile .scan {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(255,255,255,0.04) 3px, transparent 4px);
  opacity: 0.5;
}
.cam-tile .center {
  position: absolute; inset: 0; display: grid; place-items: center;
}
.cam-tile .center svg { width: 28px; height: 28px; color: rgba(255,255,255,0.3); }
.cam-overlay-top {
  position: absolute; top: 6px; left: 8px; right: 8px;
  display: flex; align-items: center; gap: 6px;
  font-family: "SF Mono", monospace;
}
.cam-overlay-top .live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #22c55e;
  animation: pulse 1.5s infinite;
}
.cam-overlay-top .tag {
  font-size: 9px; font-weight: 700;
  background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.9);
  padding: 1px 5px; border-radius: 3px;
}
.cam-overlay-rec {
  position: absolute; top: 24px; right: 8px;
  display: flex; align-items: center; gap: 3px;
  font-family: "SF Mono", monospace;
  background: rgba(0,0,0,0.5);
  padding: 1px 5px; border-radius: 3px;
}
.cam-overlay-rec .rec-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--tops-red);
  animation: pulse 1s infinite;
}
.cam-overlay-rec .rec-text { font-size: 8px; font-weight: 700; color: var(--tops-red); }
.cam-overlay-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 16px 8px 6px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
}
.cam-name { font-size: 11px; font-weight: 700; color: #fff; }
.cam-sector { font-size: 9px; color: rgba(255,255,255,0.7); }

/* Steps / progress */
.steps {
  display: flex; gap: 16px; align-items: center;
  padding: 16px; background: var(--bg-surface);
  border: 1px solid var(--stroke-soft); border-radius: 8px;
  margin-bottom: 20px;
  font-size: 11px;
}
.step-item { display: flex; align-items: center; gap: 8px; color: var(--fg-muted); }
.step-item.active { color: var(--tops-blue-900); font-weight: 700; }
.step-item.done { color: var(--status-success); font-weight: 700; }
.step-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: grid; place-items: center;
  background: var(--neutral-100); color: var(--fg-secondary);
  font-size: 10px; font-weight: 700;
}
.step-item.active .step-num { background: var(--tops-blue-900); color: #fff; }
.step-item.done .step-num { background: var(--status-success); color: #fff; }

/* Login page */
.login-shell { display: grid; grid-template-columns: 1fr 480px; min-height: 100vh; }
.login-brand {
  position: relative;
  background: linear-gradient(135deg, rgba(5,5,85,0.92), rgba(5,5,85,0.65) 60%, rgba(5,5,85,0.95));
  color: #fff;
  padding: 48px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.login-brand::before {
  content: ""; position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(201,8,18,0.08) 0%, transparent 50%);
  pointer-events: none;
}
.login-brand > * { position: relative; }
.login-stats { display: flex; gap: 32px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.15); }
.login-stat-val { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.login-stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-top: 2px; }
.login-form-side { padding: 48px 40px; display: flex; flex-direction: column; justify-content: center; background: var(--bg-surface); }

input.field {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--stroke-soft);
  border-radius: 6px;
  font-size: 14px;
  background: var(--bg-surface);
  outline: none;
  transition: all 150ms;
}
input.field:focus {
  border-color: var(--tops-blue-700);
  box-shadow: 0 0 0 3px rgba(33,69,118,0.14);
}
.field-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--fg-secondary);
  margin-bottom: 6px;
  display: block;
}

/* PDF preview */
.pdf-page {
  background: #fff;
  border-radius: 4px;
  box-shadow: 0 0 0 1px var(--stroke-soft), 0 12px 32px rgba(5,5,85,0.10);
  aspect-ratio: 1 / 1.414;
  padding: 32px;
  position: relative;
  font-size: 11px;
  color: var(--neutral-900);
  overflow: hidden;
}
.pdf-accent {
  position: absolute; top: 0; left: 0; right: 0;
  height: 4px; background: var(--tops-red);
}

/* Animations */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
@keyframes fade-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.view { animation: fade-in 200ms ease-out; }

/* Responsive */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed;
    transform: translateX(-100%);
    width: 280px;
    z-index: 100;
    transition: transform 280ms;
  }
  .app.menu-open .sidebar { transform: translateX(0); box-shadow: 0 12px 48px rgba(0,0,0,0.4); }
  .topbar { padding: 12px 16px; }
  .content { padding: 16px 16px 100px; }
  .login-shell { grid-template-columns: 1fr; }
  .login-brand { display: none; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .kpi-value { font-size: 22px; }
  .cockpit-row { grid-template-columns: 1fr; }
  .modules-grid { grid-template-columns: repeat(2, 1fr); }
  .cctv-grid { grid-template-columns: 1fr; }
  .tb-search, .tb-pill-date { display: none; }
  .page-title { font-size: 22px; }
  .mobile-menu-btn { display: grid !important; }
  .mobile-brand { display: flex !important; }
  .tb-brand.desktop-only { display: none; }
}
.mobile-menu-btn { display: none; width: 36px; height: 36px; border-radius: 6px; place-items: center; }
.mobile-menu-btn svg { width: 18px; height: 18px; }
.mobile-brand { display: none; }
.mobile-brand svg { width: 28px; height: 28px; }
.mobile-brand .name { font-size: 13px; font-weight: 900; letter-spacing: 0.14em; color: var(--tops-blue-900); }

/* Utility */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.items-start { align-items: flex-start; }
.items-end { align-items: flex-end; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: 4px; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.mt-1 { margin-top: 4px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mt-4 { margin-top: 16px; }
.mt-6 { margin-top: 24px; }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }
.text-xs { font-size: 11px; }
.text-sm { font-size: 13px; }
.font-bold { font-weight: 700; }
.font-semibold { font-weight: 600; }
.text-muted { color: var(--fg-muted); }
.text-secondary { color: var(--fg-secondary); }
.text-brand { color: var(--fg-brand); }
.text-red { color: var(--tops-red); }
.text-success { color: var(--status-success); }
.w-full { width: 100%; }
.text-right { text-align: right; }
.uppercase { text-transform: uppercase; }
.tracking-wide { letter-spacing: 0.05em; }
.tracking-wider { letter-spacing: 0.1em; }
.tracking-widest { letter-spacing: 0.16em; }
.divider { height: 1px; background: var(--stroke-soft); margin: 16px 0; }

/* ANMAT cards */
.cred-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--stroke-soft);
}
.cred-row:last-child { border-bottom: 0; }
.cred-row .icon-sq {
  width: 40px; height: 40px;
  border-radius: 6px;
  background: var(--tops-blue-900); color: #fff;
  display: grid; place-items: center;
  font-size: 10px; font-weight: 700;
}
.cred-row .info { flex: 1; min-width: 0; }
.cred-row .number { font-size: 13px; font-weight: 700; color: var(--fg-primary); }
.cred-row .holder { font-size: 11px; color: var(--fg-muted); }
.cred-row .dates { text-align: right; font-size: 10px; }

/* Temp gauges */
.temp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 14px; }
.temp-card {
  background: var(--neutral-50);
  border: 1px solid var(--stroke-soft);
  border-radius: 8px;
  padding: 12px;
}
.temp-value { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
.temp-value.ok { color: var(--status-success); }
.temp-value.warn { color: var(--status-warning); }

/* Documents grid */
.doc-types-bar { display: flex; gap: 6px; flex-wrap: wrap; padding: 6px; background: var(--bg-surface); border: 1px solid var(--stroke-soft); border-radius: 8px; }
.doc-type-chip {
  font-size: 11px; font-weight: 700;
  padding: 6px 10px;
  background: transparent;
  border-radius: 6px;
  color: var(--fg-secondary);
  cursor: pointer;
}
.doc-type-chip.active { background: var(--tops-blue-900); color: #fff; }
.doc-type-chip .count { color: var(--fg-muted); margin-left: 4px; }
.doc-type-chip.active .count { color: rgba(255,255,255,0.7); }

/* Roles grid */
.role-card {
  background: var(--bg-surface); border: 1px solid var(--stroke-soft);
  border-radius: 10px; padding: 16px;
  cursor: pointer; transition: all 200ms;
  display: block;
}
.role-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.role-icon-sq {
  width: 40px; height: 40px;
  border-radius: 6px;
  display: grid; place-items: center;
  color: #fff; font-weight: 700; font-size: 12px;
}

/* Tabs / pill group */
.tabs-pill {
  display: inline-flex; padding: 3px;
  background: var(--bg-surface); border: 1px solid var(--stroke-soft); border-radius: 8px;
  gap: 2px;
}
.tab-pill {
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px; font-weight: 700;
  color: var(--fg-secondary);
  background: transparent;
}
.tab-pill.active { background: var(--tops-blue-900); color: #fff; }
.tab-pill .count { font-size: 10px; opacity: 0.7; margin-left: 4px; font-variant-numeric: tabular-nums; }

/* Donut chart minimal */
.donut-svg { width: 160px; height: 160px; }
.donut-center {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  text-align: center;
  pointer-events: none;
}

/* Print */
@media print {
  .sidebar, .topbar { display: none; }
  .content { padding: 0; }
}

function genOrders() {
  const out = [];
  const statuses = ["firmada","firmada","firmada","enviada","enviada","pendiente","borrador","conciliada"];
  const today = new Date("2026-05-26");
  let seed = 127;
  const rng = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  for (let i = 0; i < 12; i++) {
    const v = VENDORS[Math.floor(rng() * VENDORS.length)];
    const st = statuses[Math.floor(rng() * statuses.length)];
    const dateOff = Math.floor(rng() * 18);
    const d = new Date(today.getTime() - dateOff * 86400000);
    const items = 1 + Math.floor(rng() * 4);
    const neto = Math.round((10000 + rng() * 2000000) * items);
    const total = Math.round(neto * 1.21);
    out.push({
      id: `OC-2026-${String(348 - i).padStart(4,"0")}`,
      date: d.toISOString().slice(0,10),
      vendor: v,
      status: st,
      items, total,
      categoria: v.categoria,
      depot: rng() > 0.7 ? "LUJAN" : "MAGALDI",
    });
  }
  return out;
}

function renderSpendChart() {
  const data = [
    { m: "Ene", e: 14, c: 12 }, { m: "Feb", e: 18, c: 15 }, { m: "Mar", e: 22, c: 18 },
    { m: "Abr", e: 19, c: 16 }, { m: "May", e: 28, c: 9 }, { m: "Jun", e: 25, c: 8 },
  ];
  const max = 30;
  return `
    <svg viewBox="0 0 520 220" style="width:100%;height:auto">
      ${[0,1,2,3,4].map(i => `<line x1="44" x2="510" y1="${10 + i*40}" y2="${10 + i*40}" stroke="var(--stroke-soft)" stroke-width="1"/>`).join("")}
      ${[30,22,15,7,0].map((v,i) => `<text x="40" y="${14 + i*40}" font-size="9" fill="var(--fg-muted)" text-anchor="end" class="mono">$ ${v} M</text>`).join("")}
      ${data.map((d, i) => {
        const gx = 60 + i * 75;
        const eH = (d.e / max) * 160;
        const cH = (d.c / max) * 160;
        return `
          <rect x="${gx}" y="${170 - eH}" width="18" height="${eH}" fill="#050555" rx="2"/>
          <rect x="${gx + 22}" y="${170 - cH}" width="18" height="${cH}" fill="#C90812" rx="2"/>
          <text x="${gx + 20}" y="195" font-size="11" fill="var(--fg-secondary)" text-anchor="middle" font-weight="600">${d.m}</text>
        `;
      }).join("")}
    </svg>
  `;
}

function renderDonut() {
  const data = [
    { pct: 28, color: "#050555" }, { pct: 22, color: "#214576" }, { pct: 16, color: "#3a6db0" },
    { pct: 12, color: "#C90812" }, { pct: 11, color: "#B45309" }, { pct: 11, color: "#8A94A6" },
  ];
  let acc = 0;
  const segs = data.map(d => {
    const sa = acc; acc += (d.pct / 100) * Math.PI * 2;
    const ea = acc;
    const r = 70, ir = 50, cx = 90, cy = 90;
    const x1 = cx + Math.sin(sa) * r, y1 = cy - Math.cos(sa) * r;
    const x2 = cx + Math.sin(ea) * r, y2 = cy - Math.cos(ea) * r;
    const x3 = cx + Math.sin(ea) * ir, y3 = cy - Math.cos(ea) * ir;
    const x4 = cx + Math.sin(sa) * ir, y4 = cy - Math.cos(sa) * ir;
    const large = ea - sa > Math.PI ? 1 : 0;
    return `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${ir} ${ir} 0 ${large} 0 ${x4} ${y4} Z" fill="${d.color}"/>`;
  }).join("");
  return `
    <svg viewBox="0 0 180 180" class="donut-svg">
      ${segs}
      <text x="90" y="86" text-anchor="middle" font-size="20" font-weight="700" fill="#050555" class="tabular">$ 29,7</text>
      <text x="90" y="102" text-anchor="middle" font-size="8" font-weight="700" letter-spacing="2" fill="var(--fg-muted)">MILLONES</text>
    </svg>
  `;
}

function renderCamTile(c) {

  return `
    <div class="cam-tile">
      <div class="bg"></div>
      <div class="scan"></div>
      <div class="center">
        ${c.status === "offline"
          ? `<div style="text-align:center"><div style="color:var(--tops-red);font-size:24px">⊘</div><div style="font-size:9px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.1em;margin-top:4px">No signal</div></div>`
          : icon("eye", 28)
        }
      </div>
      <div class="cam-overlay-top">
        <span class="live-dot" style="background:${dotColor}"></span>
        <span class="tag mono">D${c.id.split("-")[1]}</span>
        <span class="tag mono" style="margin-left:auto">${c.res === "2160" ? "2160p" : "1080p"} · ${c.fps}fps</span>
      </div>
      ${c.status === "online" ? `
        <div class="cam-overlay-rec">
          <span class="rec-dot"></span><span class="rec-text">REC</span>
        </div>
      ` : ""}
      <div class="cam-overlay-bottom">
        <div class="cam-name">${c.sector}</div>
        <div class="cam-sector mono">${c.id}</div>
      </div>
    </div>
  `;
}

/* ===== Master render ===== */
function renderApp() {
  const root = document.getElementById("root");
  if (!isLoggedIn) {
    root.className = "";
    root.innerHTML = renderLogin();
    return;
  }
  const view = routes[currentRoute] ? routes[currentRoute]() : routes.cockpit();
  root.className = "app";
  root.innerHTML = `
    ${renderSidebar()}
    <div class="main">
      ${renderTopbar()}
      <div class="content">${view}</div>
    </div>
  `;
}

// Init
const initialHash = location.hash.replace("#", "");
if (initialHash && routes[initialHash]) currentRoute = initialHash;
renderApp();

// Mobile menu close on outside click
document.addEventListener("click", (e) => {
  const root = document.getElementById("root");
  if (root.classList.contains("menu-open")) {
    if (!e.target.closest(".sidebar") && !e.target.closest(".mobile-menu-btn")) {
      root.classList.remove("menu-open");
    }
  }
});
