name: Supabase Daily Backup

# Backup externo de la DB de producción Supabase → Google Drive ("TOPS Nexus Backups").
# Cierra el bloqueante P0.1 de GATE 0 (retención AFIP RG 1415 = 10 años).
#
# Migración 2026-06-04: se reemplazó Google Cloud Storage por Google Drive (sin buckets,
# sin gs://, sin gcloud storage, sin billing de GCP). La subida usa la Service Account
# tops-ordenes-drive@tops-ordenes.iam.gserviceaccount.com vía la Drive API.
#
# Secrets requeridos (GitHub → Settings → Secrets and variables → Actions):
#   - SUPABASE_DB_URL : cadena Postgres de PRODUCCIÓN (Session Pooler) con sslmode=require
#   - GCP_SA_KEY      : JSON de la Service Account `tops-ordenes-drive@...` (con acceso a Drive)
# Config (no secreta, definida abajo como env del job):
#   - DRIVE_FOLDER_ID : carpeta destino "TOPS Nexus Backups"
#   - DRIVE_IMPERSONATE_SUBJECT : usuario Workspace a impersonar (domain-wide delegation).
#       Necesario porque una service account no tiene quota de Drive: impersona al usuario
#       (18 TB) para que el archivo se cuente contra su almacenamiento. Requiere DWD habilitada
#       en Admin de Workspace (API Controls → Domain-wide delegation → client_id de la SA con
#       scope https://www.googleapis.com/auth/drive). Alternativa: usar una Shared Drive.

on:
  schedule:
    - cron: '0 5 * * *' # 02:00 ART = 05:00 UTC, diario
  workflow_dispatch: {} # trigger manual (primer backup / on-demand)

permissions:
  contents: read
  issues: write # para abrir issue P0 si el backup falla

concurrency:
  group: supabase-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DRIVE_FOLDER_ID: "1Erng2SywVN9ymHqUzkT0iMRrKSmrHWBw"
      DRIVE_IMPERSONATE_SUBJECT: "martin.battaglia@logisticatops.com"
    steps:
      - name: Validar secrets requeridos (fail-fast)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for v in SUPABASE_DB_URL GCP_SA_KEY; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Secret requerido '$v' ausente o vacío."
              missing=1
            fi
          done
          if [ -z "${DRIVE_FOLDER_ID:-}" ]; then
            echo "::error::DRIVE_FOLDER_ID no configurado."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "::error::Faltan secrets/config. Revisar Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "✓ Secrets y config requeridos presentes."

      - name: Instalar pg_dump 17 (repo oficial PGDG)
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          if ! command -v pg_dump > /dev/null; then
            echo "::error::pg_dump no quedó instalado tras la instalación PGDG."
            exit 1
          fi
          pg_dump --version
          pg_restore --version

      - name: Generar backup (custom format, compress 9)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          DATE_PATH=$(date -u +'%Y/%m/%d')
          FILENAME="backup-$(date -u +'%Y-%m-%dT%H%M%SZ').dump"
          pg_dump "$SUPABASE_DB_URL" \
            --format=custom --compress=9 --no-owner --no-acl --verbose \
            --file="$FILENAME"
          if [ ! -s "$FILENAME" ]; then
            echo "::error::El dump '$FILENAME' está vacío o no se creó."
            exit 1
          fi
          SIZE=$(stat -c%s "$FILENAME")
          echo "✓ Dump generado: $FILENAME ($SIZE bytes)"
          # Validación de integridad: pg_restore debe poder listar el contenido.
          if ! pg_restore --list "$FILENAME" > /dev/null; then
            echo "::error::'pg_restore --list' falló: el dump podría estar corrupto."
            exit 1
          fi
          echo "✓ Integridad del dump verificada (pg_restore --list OK)."
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          echo "DATE_PATH=$DATE_PATH" >> "$GITHUB_ENV"

      - name: Instalar cliente de Google Drive (Python)
        run: |
          set -euo pipefail
          python3 -m pip install --quiet --upgrade \
            google-api-python-client google-auth
          echo "✓ google-api-python-client instalado."

      - name: Subir backup a Google Drive
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, sys
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from googleapiclient.errors import HttpError

          info = json.loads(os.environ["GCP_SA_KEY"])
          scopes = ["https://www.googleapis.com/auth/drive"]
          creds = service_account.Credentials.from_service_account_info(info, scopes=scopes)
          subject = os.environ.get("DRIVE_IMPERSONATE_SUBJECT", "").strip()
          if subject:
              creds = creds.with_subject(subject)   # domain-wide delegation → usa quota del usuario

          svc = build("drive", "v3", credentials=creds, cache_discovery=False)
          filename = os.environ["FILENAME"]
          folder_id = os.environ["DRIVE_FOLDER_ID"]
          media = MediaFileUpload(filename, mimetype="application/octet-stream", resumable=True)
          meta = {"name": filename, "parents": [folder_id]}

          try:
              f = svc.files().create(
                  body=meta, media_body=media,
                  fields="id,name,size,createdTime",
                  supportsAllDrives=True,
              ).execute()
          except HttpError as e:
              msg = str(e)
              print(f"::error::Drive upload falló: {msg}", file=sys.stderr)
              if "quota" in msg.lower() or "storageQuota" in msg:
                  print("::error::La Service Account no tiene quota de Drive. "
                        "Habilitar domain-wide delegation (impersonar usuario Workspace) "
                        "o usar una Shared Drive.", file=sys.stderr)
              raise

          with open(os.environ["GITHUB_ENV"], "a") as env:
              env.write(f"DRIVE_FILE_ID={f['id']}\n")
          print(f"✓ Subido a Drive: id={f['id']} name={f['name']} "
                f"size={f.get('size')} created={f.get('createdTime')}")
          PY

      - name: Verificar archivo en Drive
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, sys
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          info = json.loads(os.environ["GCP_SA_KEY"])
          creds = service_account.Credentials.from_service_account_info(
              info, scopes=["https://www.googleapis.com/auth/drive"])
          subject = os.environ.get("DRIVE_IMPERSONATE_SUBJECT", "").strip()
          if subject:
              creds = creds.with_subject(subject)
          svc = build("drive", "v3", credentials=creds, cache_discovery=False)

          fid = os.environ["DRIVE_FILE_ID"]
          f = svc.files().get(fileId=fid,
                              fields="id,name,size,createdTime,parents",
                              supportsAllDrives=True).execute()
          size = int(f.get("size", 0))
          if size <= 0:
              print("::error::El archivo en Drive tiene tamaño 0.", file=sys.stderr)
              sys.exit(1)
          if os.environ["DRIVE_FOLDER_ID"] not in (f.get("parents") or []):
              print("::error::El archivo no está en la carpeta de backups esperada.", file=sys.stderr)
              sys.exit(1)
          print(f"✓ Verificado en Drive: {f['name']} ({size} bytes) created={f['createdTime']}")
          print("Backup uploaded successfully")
          PY

      - name: Cleanup local file
        if: always()
        run: rm -f "${FILENAME:-}"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              ...context.repo,
              title: `🚨 Backup Supabase falló · ${new Date().toISOString().slice(0, 10)}`,
              body: `Workflow: ${context.workflow}\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['ops', 'backup', 'urgent'],
            });
