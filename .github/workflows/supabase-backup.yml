name: Supabase Daily Backup

# Backup externo de la DB de producción Supabase → Google Cloud Storage.
# Cierra el bloqueante P0.1 de GATE 0 (retención AFIP RG 1415 = 10 años).
# Requiere 3 GitHub Secrets (ver docs/erp/BACKUP-EXECUTION-RUNBOOK.md §5):
#   - SUPABASE_DB_URL : cadena Postgres de PRODUCCIÓN con sslmode=require
#   - GCP_SA_KEY      : JSON completo de la service account write-only
#   - GCS_BUCKET      : tops-nexus-supabase-backups
# NO corre hasta que los 3 secrets existan en el repo.

on:
  schedule:
    - cron: '0 5 * * *' # 02:00 ART = 05:00 UTC, diario
  workflow_dispatch: {} # trigger manual (primer backup / on-demand)

permissions:
  contents: read
  issues: write # para abrir issue P0 si el backup falla

concurrency:
  group: supabase-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install pg_dump v15 (Supabase corre Postgres 15)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-15
          pg_dump --version

      - name: Generate backup (custom format, compress 9)
        run: |
          DATE_PATH=$(date -u +'%Y/%m/%d')
          FILENAME="backup-$(date -u +'%Y-%m-%dT%H%M%SZ').dump"
          pg_dump "$SUPABASE_DB_URL" \
            --format=custom --compress=9 --no-owner --no-acl --verbose \
            --file="$FILENAME"
          ls -lh "$FILENAME"
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          echo "DATE_PATH=$DATE_PATH" >> "$GITHUB_ENV"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload to GCS
        run: |
          gcloud storage cp "$FILENAME" \
            "gs://${{ secrets.GCS_BUCKET }}/${DATE_PATH}/${FILENAME}"

      - name: Verify upload
        run: |
          gcloud storage ls -l "gs://${{ secrets.GCS_BUCKET }}/${DATE_PATH}/${FILENAME}"

      - name: Cleanup local file
        if: always()
        run: rm -f "$FILENAME"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              ...context.repo,
              title: `🚨 Backup Supabase falló · ${new Date().toISOString().slice(0, 10)}`,
              body: `Workflow: ${context.workflow}\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['ops', 'backup', 'urgent'],
            });
