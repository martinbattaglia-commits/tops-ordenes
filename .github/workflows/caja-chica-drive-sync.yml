name: Caja Chica · Drive Sync (diario 21:05 ART)

# Espejo diario de la Caja Chica (Tesorería) desde la planilla de Google Drive
# «Caja chica .xlsx» (solapa por ejercicio: 2026, 2027…), fuente de verdad
# operativa. Dispara el endpoint protegido /api/tesoreria/caja-chica/sync, que
# baja el XLSX por fileId, parsea, categoriza y hace snapshot-replace en Supabase.
#
# Horario: 00:05 UTC = 21:05 America/Argentina/Buenos_Aires (UTC-3 fijo, sin DST).
# Se corre 5 min después de Compliance/Contratos (21:00) para no solaparse.
#
# Secrets requeridos (GitHub → Settings → Secrets and variables → Actions):
#   - CRON_SECRET : mismo valor que la env var CRON_SECRET en Netlify.
#   - APP_URL     : (opcional) base URL del deploy; default https://tops-ordenes.netlify.app
#
# Env requerida en Netlify (no acá): CAJA_CHICA_DRIVE_FILE_ID (+ la Service Account
# de Drive ya compartida sobre la planilla). La sync corre en el servidor (Netlify);
# este workflow sólo la dispara.

# ⛔ DADO DE BAJA — CCN-001B · F4 (Dirección, 2026-07-22).
# Google Sheets dejó de ser el sistema operativo de Caja Chica: la fuente de
# verdad es Nexus ERP (módulo nativo). La planilla queda SOLO como respaldo
# histórico y consulta. El cron diario queda desactivado.
#
# Defensa en profundidad: además de este cron apagado, el endpoint
# /api/tesoreria/caja-chica/sync responde 410 Gone salvo que Dirección
# reactive con CAJA_CHICA_SYNC_ENABLED=1, y las tablas cash_box_* quedan
# congeladas en la base (sólo SELECT).
#
# Para reactivar (requiere decisión de Dirección): descomentar el bloque
# `schedule` y setear CAJA_CHICA_SYNC_ENABLED=1 en Netlify.
on:
  # schedule:
  #   - cron: "5 0 * * *" # 00:05 UTC = 21:05 ART, diario — DESACTIVADO (F4)
  workflow_dispatch:
    inputs:
      dry:
        description: "Dry-run (1 = recorre y reporta sin escribir; 0 = sync real). NOTA: el endpoint responde 410 salvo CAJA_CHICA_SYNC_ENABLED=1."
        default: "1"
        required: false

permissions:
  contents: read

concurrency:
  group: caja-chica-drive-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Caja Chica ↔ Drive sync endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DRY: ${{ github.event.inputs.dry || '0' }}
        run: |
          set -euo pipefail
          BASE="${APP_URL:-https://tops-ordenes.netlify.app}"
          URL="$BASE/api/tesoreria/caja-chica/sync?dry=${DRY}"
          echo "POST $URL"
          code=$(curl -sS --max-time 120 -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$URL")
          echo "HTTP $code"
          cat /tmp/resp.json || true
          echo
          test "$code" = "200"
