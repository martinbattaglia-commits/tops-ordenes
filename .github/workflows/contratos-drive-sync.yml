name: Contratos · Drive Sync (diario 21:00 ART)

# Ingesta diaria de la cartera contractual desde Google Drive
# («Comercial → Cynthia → Clientes»), que es la fuente de verdad operativa.
# Dispara el endpoint protegido /api/comercial/contratos/sync, que recorre la
# carpeta, detecta altas/cambios/bajas y actualiza el repositorio Nexus.
#
# Horario: 00:00 UTC = 21:00 America/Argentina/Buenos_Aires (UTC-3 fijo, sin DST).
#
# Secrets requeridos (GitHub → Settings → Secrets and variables → Actions):
#   - CRON_SECRET : mismo valor que la env var CRON_SECRET en Netlify.
#   - APP_URL     : (opcional) base URL del deploy; default https://tops-ordenes.netlify.app
#
# La sincronización en sí se ejecuta en el servidor (Netlify): este workflow sólo
# la dispara. Reutiliza la integración Drive corporativa (service account) ya
# configurada en la app — no requiere credenciales de Google aquí.

on:
  schedule:
    - cron: "0 0 * * *" # 00:00 UTC = 21:00 ART, diario
  workflow_dispatch: {} # disparo manual on-demand

permissions:
  contents: read

concurrency:
  group: contratos-drive-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Contratos ↔ Drive sync endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          BASE="${APP_URL:-https://tops-ordenes.netlify.app}"
          echo "POST $BASE/api/comercial/contratos/sync"
          code=$(curl -sS --max-time 120 -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$BASE/api/comercial/contratos/sync")
          echo "HTTP $code"
          cat /tmp/resp.json || true
          echo
          # Éxito = HTTP 200 + reporte 'completed' sin errores. 'partial' (presupuesto de
          # tiempo agotado) NO es falla: la corrida progresa y se completa en las próximas
          # (extracción diferida + docs ya hechos se saltean). Fallan: errors>0, o un estado
          # de error real (carpeta mal configurada='error', 'skipped', 'unknown').
          test "$code" = "200"
          status=$(jq -r '.status // "unknown"' /tmp/resp.json)
          errors=$(jq -r '.errors // 0' /tmp/resp.json)
          echo "report.status=$status report.errors=$errors"
          if [ "$errors" != "0" ]; then
            echo "::error::Sync con errores (errors=$errors). Revisar el reporte arriba."
            exit 1
          fi
          case "$status" in
            completed) echo "Sync completo." ;;
            partial)   echo "::warning::Sync parcial (presupuesto agotado); se completa en próximas corridas." ;;
            *)         echo "::error::Sync no completado (status=$status). Revisar el reporte arriba."; exit 1 ;;
          esac
