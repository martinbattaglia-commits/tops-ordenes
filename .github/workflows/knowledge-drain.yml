name: Knowledge · Drain Worker (cada 5 min)

# F0.5.2 / E2.1 — Worker de drenado de la cola de Knowledge.
# Dispara el endpoint protegido /api/knowledge/drain, que reclama eventos
# pending/failed, ejecuta el procesador (no-op en E2.1) y transiciona estados
# (processed | failed+backoff | dead). La lógica corre en el servidor (Netlify);
# este workflow sólo la dispara.
#
# Secrets requeridos (GitHub → Settings → Secrets and variables → Actions):
#   - CRON_SECRET : mismo valor que la env var CRON_SECRET en Netlify.
#   - APP_URL     : (opcional) base URL del deploy; default https://tops-ordenes.netlify.app

on:
  schedule:
    - cron: "*/5 * * * *" # cada 5 minutos
  workflow_dispatch:
    inputs:
      dry:
        description: "Dry-run (1 = solo cuenta los eventos due, no procesa; 0 = drena real)."
        default: "0"
        required: false

permissions:
  contents: read

concurrency:
  group: knowledge-drain
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/knowledge/drain
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DRY: ${{ github.event.inputs.dry || '0' }}
        run: |
          set -euo pipefail
          BASE="${APP_URL:-https://tops-ordenes.netlify.app}"
          URL="$BASE/api/knowledge/drain?dry=${DRY}"
          echo "POST $URL"
          code=$(curl -sS --max-time 90 -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$URL")
          echo "HTTP $code"
          cat /tmp/resp.json || true
          echo
          test "$code" = "200"
